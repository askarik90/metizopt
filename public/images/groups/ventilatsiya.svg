<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#164e63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad2)"/>
  
  <!-- Ventilation duct -->
  <rect x="100" y="80" width="120" height="240" fill="url(#metalBlue)" stroke="#0c4a6e" stroke-width="2" rx="8"/>
  
  <!-- Duct ridges -->
  <line x1="110" y1="100" x2="210" y2="100" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="130" x2="210" y2="130" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="160" x2="210" y2="160" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="190" x2="210" y2="190" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="220" x2="210" y2="220" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="250" x2="210" y2="250" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="280" x2="210" y2="280" stroke="#0c4a6e" stroke-width="1" opacity="0.5"/>
  
  <!-- Fan -->
  <circle cx="280" cy="200" r="45" fill="url(#metalBlue)" stroke="#0c4a6e" stroke-width="2"/>
  <circle cx="280" cy="200" r="30" fill="none" stroke="#0c4a6e" stroke-width="3"/>
  
  <!-- Fan blades -->
  <path d="M 280 170 Q 300 200 280 230" stroke="#0c4a6e" stroke-width="3" fill="none"/>
  <path d="M 250 200 Q 280 220 310 200" stroke="#0c4a6e" stroke-width="3" fill="none"/>
  
  <!-- Connection flanges -->
  <rect x="95" y="75" width="130" height="15" fill="url(#metalBlue)" stroke="#0c4a6e" stroke-width="1.5"/>
  <rect x="95" y="310" width="130" height="15" fill="url(#metalBlue)" stroke="#0c4a6e" stroke-width="1.5"/>
  
  <!-- Bolts on flanges -->
  <circle cx="115" cy="82" r="3" fill="#0c4a6e"/>
  <circle cx="160" cy="82" r="3" fill="#0c4a6e"/>
  <circle cx="205" cy="82" r="3" fill="#0c4a6e"/>
  <circle cx="115" cy="317" r="3" fill="#0c4a6e"/>
  <circle cx="160" cy="317" r="3" fill="#0c4a6e"/>
  <circle cx="205" cy="317" r="3" fill="#0c4a6e"/>
  
  <!-- Shine -->
  <ellipse cx="130" cy="120" rx="15" ry="35" fill="#ffffff" opacity="0.2"/>
  <circle cx="290" cy="180" r="8" fill="#ffffff" opacity="0.3"/>
</svg>
