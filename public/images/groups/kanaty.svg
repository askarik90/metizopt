<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ropeMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad6)"/>
  
  <!-- Rope coils -->
  <circle cx="150" cy="150" r="50" fill="none" stroke="url(#ropeMetal)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="150" cy="150" r="40" fill="none" stroke="url(#ropeMetal)" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  <circle cx="150" cy="150" r="30" fill="none" stroke="url(#ropeMetal)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Rope strands -->
  <path d="M 100 150 Q 80 140 90 100 Q 100 80 130 90" fill="none" stroke="url(#ropeMetal)" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Steel cable -->
  <path d="M 280 80 Q 350 80 380 200 Q 360 280 300 300" fill="none" stroke="url(#ropeMetal)" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Twisted cable detail -->
  <path d="M 285 90 Q 340 95 370 200" fill="none" stroke="#7f1d1d" stroke-width="2" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Cable terminal/shackle -->
  <circle cx="300" cy="300" r="15" fill="url(#ropeMetal)" stroke="#7f1d1d" stroke-width="2"/>
  <rect x="295" y="320" width="10" height="40" fill="url(#ropeMetal)" stroke="#7f1d1d" stroke-width="1"/>
  
  <!-- Another coil -->
  <circle cx="480" cy="200" r="35" fill="none" stroke="url(#ropeMetal)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="480" cy="200" r="25" fill="none" stroke="url(#ropeMetal)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Shine -->
  <ellipse cx="130" cy="120" rx="15" ry="25" fill="#ffffff" opacity="0.25"/>
</svg>
