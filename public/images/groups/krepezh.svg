<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1d5db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad1)"/>
  
  <!-- Large bolt in center -->
  <circle cx="150" cy="120" r="35" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="2"/>
  <rect x="140" y="160" width="20" height="80" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="120,240 180,240 175,260 125,260" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="1.5"/>
  
  <!-- Bolt head pattern -->
  <line x1="135" y1="120" x2="165" y2="120" stroke="#4b5563" stroke-width="2"/>
  <line x1="130" y1="115" x2="170" y2="115" stroke="#4b5563" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Small nuts and bolts scattered -->
  <polygon points="320,150 330,155 325,170 315,165" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="1"/>
  <rect x="330" y="145" width="8" height="35" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="0.8"/>
  
  <polygon points="420,200 428,204 424,215 416,211" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="1"/>
  <rect x="428" y="197" width="6" height="25" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="0.8"/>
  
  <circle cx="500" cy="280" r="18" fill="url(#metalGrad)" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="490" y1="280" x2="510" y2="280" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="500" y1="270" x2="500" y2="290" stroke="#4b5563" stroke-width="1.5"/>
  
  <!-- Washers -->
  <circle cx="280" cy="280" r="22" fill="none" stroke="url(#metalGrad)" stroke-width="8"/>
  <circle cx="280" cy="280" r="10" fill="#1e293b"/>
  
  <!-- Shine effect -->
  <ellipse cx="160" cy="110" rx="15" ry="20" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="330" cy="155" rx="4" ry="6" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="490" cy="270" rx="8" ry="10" fill="#ffffff" opacity="0.3"/>
</svg>
