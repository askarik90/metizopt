<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="metalShine" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#d4d4d8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#52525b;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e4e4e7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a1a1a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52525b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="#f8f8f8"/>
  
  <!-- Большой болт справа -->
  <g transform="translate(450, 120)">
    <circle cx="0" cy="0" r="45" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="2"/>
    <circle cx="0" cy="0" r="45" fill="url(#metalShine)"/>
    <rect x="-8" y="45" width="16" height="140" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="0,185 -20,200 20,200" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1.5"/>
    <!-- Блеск на болте -->
    <ellipse cx="-15" cy="-15" rx="12" ry="15" fill="#ffffff" opacity="0.4"/>
  </g>
  
  <!-- Гайка -->
  <g transform="translate(500, 280)">
    <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="#f8f8f8" stroke="#9ca3af" stroke-width="1"/>
    <ellipse cx="-8" cy="-8" rx="5" ry="6" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Шайба -->
  <g transform="translate(420, 300)">
    <circle cx="0" cy="0" r="30" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="#f8f8f8" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="url(#metalShine)"/>
  </g>
  
  <!-- Еще один болт меньше -->
  <g transform="translate(350, 180)">
    <circle cx="0" cy="0" r="28" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="28" fill="url(#metalShine)"/>
    <rect x="-5" y="28" width="10" height="80" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1"/>
    <polygon points="0,108 -12,118 12,118" fill="url(#metalGrad)" stroke="#3f3f46" stroke-width="1"/>
  </g>
  
  <!-- Тень от болтов -->
  <ellipse cx="420" cy="320" rx="80" ry="15" fill="#000000" opacity="0.1"/>
</svg>
