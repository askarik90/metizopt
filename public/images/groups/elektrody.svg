<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#831843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="electrodeMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbcfe8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coating" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad7)"/>
  
  <!-- Electrodes bundle -->
  <g transform="translate(100, 80)">
    <!-- First electrode -->
    <rect x="0" y="0" width="12" height="200" fill="url(#coating)" stroke="#831843" stroke-width="1"/>
    <rect x="1" y="40" width="10" height="120" fill="url(#electrodeMetal)" stroke="#831843" stroke-width="0.5"/>
    
    <!-- Second electrode -->
    <rect x="20" y="0" width="12" height="200" fill="url(#coating)" stroke="#831843" stroke-width="1"/>
    <rect x="21" y="40" width="10" height="120" fill="url(#electrodeMetal)" stroke="#831843" stroke-width="0.5"/>
    
    <!-- Third electrode -->
    <rect x="40" y="0" width="12" height="200" fill="url(#coating)" stroke="#831843" stroke-width="1"/>
    <rect x="41" y="40" width="10" height="120" fill="url(#electrodeMetal)" stroke="#831843" stroke-width="0.5"/>
    
    <!-- Fourth electrode -->
    <rect x="60" y="0" width="12" height="200" fill="url(#coating)" stroke="#831843" stroke-width="1"/>
    <rect x="61" y="40" width="10" height="120" fill="url(#electrodeMetal)" stroke="#831843" stroke-width="0.5"/>
    
    <!-- Fifth electrode -->
    <rect x="80" y="0" width="12" height="200" fill="url(#coating)" stroke="#831843" stroke-width="1"/>
    <rect x="81" y="40" width="10" height="120" fill="url(#electrodeMetal)" stroke="#831843" stroke-width="0.5"/>
  </g>
  
  <!-- Welding spark effect -->
  <circle cx="380" cy="150" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="390" cy="145" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="370" cy="155" r="2.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="400" cy="155" r="2" fill="#fbbf24" opacity="0.5"/>
  
  <!-- Arc lines -->
  <path d="M 385 140 Q 395 130 405 120" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 375 160 Q 385 170 390 180" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Shine on electrodes -->
  <ellipse cx="120" cy="100" rx="3" ry="20" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="160" cy="100" rx="3" ry="20" fill="#ffffff" opacity="0.2"/>
</svg>
