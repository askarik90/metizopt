<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad3)"/>
  
  <!-- Perforated metal sheet -->
  <rect x="80" y="60" width="280" height="280" fill="url(#metalGold)" stroke="#78350f" stroke-width="2" rx="4"/>
  
  <!-- Holes in grid pattern -->
  <circle cx="110" cy="90" r="6" fill="#78350f"/>
  <circle cx="150" cy="90" r="6" fill="#78350f"/>
  <circle cx="190" cy="90" r="6" fill="#78350f"/>
  <circle cx="230" cy="90" r="6" fill="#78350f"/>
  <circle cx="270" cy="90" r="6" fill="#78350f"/>
  <circle cx="310" cy="90" r="6" fill="#78350f"/>
  
  <circle cx="110" cy="135" r="6" fill="#78350f"/>
  <circle cx="150" cy="135" r="6" fill="#78350f"/>
  <circle cx="190" cy="135" r="6" fill="#78350f"/>
  <circle cx="230" cy="135" r="6" fill="#78350f"/>
  <circle cx="270" cy="135" r="6" fill="#78350f"/>
  <circle cx="310" cy="135" r="6" fill="#78350f"/>
  
  <circle cx="110" cy="180" r="6" fill="#78350f"/>
  <circle cx="150" cy="180" r="6" fill="#78350f"/>
  <circle cx="190" cy="180" r="6" fill="#78350f"/>
  <circle cx="230" cy="180" r="6" fill="#78350f"/>
  <circle cx="270" cy="180" r="6" fill="#78350f"/>
  <circle cx="310" cy="180" r="6" fill="#78350f"/>
  
  <circle cx="110" cy="225" r="6" fill="#78350f"/>
  <circle cx="150" cy="225" r="6" fill="#78350f"/>
  <circle cx="190" cy="225" r="6" fill="#78350f"/>
  <circle cx="230" cy="225" r="6" fill="#78350f"/>
  <circle cx="270" cy="225" r="6" fill="#78350f"/>
  <circle cx="310" cy="225" r="6" fill="#78350f"/>
  
  <circle cx="110" cy="270" r="6" fill="#78350f"/>
  <circle cx="150" cy="270" r="6" fill="#78350f"/>
  <circle cx="190" cy="270" r="6" fill="#78350f"/>
  <circle cx="230" cy="270" r="6" fill="#78350f"/>
  <circle cx="270" cy="270" r="6" fill="#78350f"/>
  <circle cx="310" cy="270" r="6" fill="#78350f"/>
  
  <circle cx="110" cy="315" r="6" fill="#78350f"/>
  <circle cx="150" cy="315" r="6" fill="#78350f"/>
  <circle cx="190" cy="315" r="6" fill="#78350f"/>
  <circle cx="230" cy="315" r="6" fill="#78350f"/>
  <circle cx="270" cy="315" r="6" fill="#78350f"/>
  <circle cx="310" cy="315" r="6" fill="#78350f"/>
  
  <!-- Metal angle -->
  <polygon points="400,120 480,120 480,200 400,200" fill="url(#metalGold)" stroke="#78350f" stroke-width="2"/>
  <line x1="400" y1="160" x2="480" y2="160" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  
  <!-- Shine -->
  <ellipse cx="150" cy="130" rx="40" ry="80" fill="#ffffff" opacity="0.15"/>
</svg>
